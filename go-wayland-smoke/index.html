<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Go Wayland Smoke Demo</title>
</head>
<body bgcolor="#000000">
    <canvas id="canvas" width="200" height="200" style="border: 5px solid red"></canvas>
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("smoke_wasm.wasm"), go.importObject)
            .then(result => go.run(result.instance));
    </script>
</body>
</html>
